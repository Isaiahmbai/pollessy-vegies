<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollessy Vegies & Fruits</title>
<style>
body { font-family: Arial; margin:0; background:#eef2f1; }
header { background:#2e7d32; color:white; padding:15px; text-align:center; }
nav { display:flex; justify-content:space-between; padding:10px; background:#1b5e20; color:white; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.card { background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
img { width:100%; height:150px; object-fit:cover; border-radius:8px; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
button { padding:8px; background:#2e7d32; color:white; border:none; cursor:pointer; border-radius:5px; }
.login-box { max-width:320px; margin:auto; background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.section-title { margin-top:25px; }
</style>
</head>
<body>

<header>
<h1>🌿 Pollessy Vegies & Fruits</h1>
<p>Fresh from farm to your table</p>
</header>

<nav>
<div>Cart: <span id="cartCount">0</span></div>
<div id="userStatus"></div>
</nav>

<div class="container">

<!-- AUTH -->
<div id="auth" class="login-box">
<h2>Login / Register</h2>
<input id="username" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
<h2>Admin Dashboard</h2>

<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imageFile" accept="image/*">
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add Product</button>

<h3>Orders</h3>
<div id="orders"></div>

<h3>Add Admin Email</h3>
<input id="newAdmin" placeholder="Admin Email">
<button onclick="addAdmin()">Add Admin</button>
</div>

<h2 class="section-title">Products</h2>
<div id="products" class="grid"></div>

<h2 class="section-title">Recommended for You</h2>
<div id="recommendations" class="grid"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let users = JSON.parse(localStorage.getItem('users')) || [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let admins = JSON.parse(localStorage.getItem('admins')) || ["mbaiisaiah@gmail.com"];

let currentUser = localStorage.getItem('currentUser');
if(currentUser === "null") currentUser = null;

function save(){
localStorage.setItem('products', JSON.stringify(products));
localStorage.setItem('cart', JSON.stringify(cart));
localStorage.setItem('users', JSON.stringify(users));
localStorage.setItem('orders', JSON.stringify(orders));
localStorage.setItem('admins', JSON.stringify(admins));
localStorage.setItem('currentUser', currentUser);
}

function updateUserUI(){
let status=document.getElementById('userStatus');

if(currentUser){
status.innerHTML = `Logged in: ${currentUser} <button onclick="logout()">Logout</button>`;
document.getElementById('auth').style.display='none';

if(admins.includes(currentUser)){
document.getElementById('adminPanel').style.display='block';
loadOrders();
}

}else{
status.innerHTML='Not logged in';
document.getElementById('auth').style.display='block';
document.getElementById('adminPanel').style.display='none';
}
}

function register(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
if(!u||!p) return alert('fill fields');
users.push({u,p});
alert('registered');
save();
}

function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
let user=users.find(x=>x.u===u && x.p===p);
if(user){ currentUser=u; save(); updateUserUI(); }
else alert('invalid');
}

function logout(){
currentUser = null;
save();
updateUserUI();
}

function addAdmin(){
let email=document.getElementById('newAdmin').value;
if(email && !admins.includes(email)){
admins.push(email);
save();
alert('Admin added');
}
}

function addProduct(){
let name=document.getElementById('name').value;
let price=document.getElementById('price').value;
let desc=document.getElementById('desc').value;
let file=document.getElementById('imageFile').files[0];

if(!name||!price) return alert('fill required');

if(file){
let reader = new FileReader();
reader.onload = function(e){
products.push({name,price,desc,image:e.target.result});
save(); display(); showRecommendations();
};
reader.readAsDataURL(file);
}else{
products.push({name,price,desc,image:""});
save(); display(); showRecommendations();
}
}

function addToCart(i){
cart.push(products[i]);
save(); updateCart();
}

function updateCart(){ document.getElementById('cartCount').innerText=cart.length; }

function placeOrder(){
if(!currentUser) return alert('Login first');
let location=prompt('Enter delivery location');
orders.push({user:currentUser, items:cart, location, date:new Date().toLocaleString()});
save(); alert('Order placed');
cart=[]; save(); updateCart();
}

function loadOrders(){
let oDiv=document.getElementById('orders');
oDiv.innerHTML='';
orders.forEach((o,i)=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`
<b>${o.user}</b><br>
Location: ${o.location}<br>
Date: ${o.date}<br>
Items:<br>
${o.items.map(x=>x.name+' - '+x.price).join('<br>')}<br>
<button onclick="clearOrder(${i})">Done</button>
`;
oDiv.appendChild(d);
});
}

function clearOrder(i){ orders.splice(i,1); save(); loadOrders(); }

function display(){
let c=document.getElementById('products');
c.innerHTML='';
products.forEach((p,i)=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`
<img src="${p.image||'https://via.placeholder.com/200'}">
<h3>${p.name}</h3>
<p>${p.desc||''}</p>
<b>KES ${p.price}</b><br>
<button onclick="addToCart(${i})">Add to Cart</button>
`;
c.appendChild(d);
});
}

function showRecommendations(){
let r=document.getElementById('recommendations');
r.innerHTML='';
if(products.length===0) return;

let shuffled = [...products].sort(()=>0.5 - Math.random());
let recs = shuffled.slice(0,3);

recs.forEach(p=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`
<img src="${p.image||'https://via.placeholder.com/200'}">
<h3>${p.name}</h3>
<b>KES ${p.price}</b>
`;
r.appendChild(d);
});
}

updateCart();
display();
showRecommendations();
updateUserUI();

let btn=document.createElement('button');
btn.innerText='Place Order';
btn.style.position='fixed';
btn.style.bottom='20px';
btn.style.right='20px';
btn.onclick=placeOrder;
document.body.appendChild(btn);

</script>

</body>
</html>
