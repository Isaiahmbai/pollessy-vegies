<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollessy Vegies & Fruits</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

/* NAV */
.nav {
  background:#0f3d2e;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}
.nav button {
  background:white;
  border:none;
  padding:8px;
  cursor:pointer;
}

/* PAGES */
.page { display:none; padding:20px; }
.active { display:block; }

/* PRODUCTS */
.product {
  background:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

/* ADMIN */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
}

table {
  width:100%;
  border-collapse:collapse;
}
td, th {
  padding:10px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h3>Pollessy Vegies & Fruits</h3>
  <div>
    <button onclick="showPage('shop')">Shop</button>
    <button onclick="showPage('admin')">Admin</button>
  </div>
</div>

<!-- SHOP PAGE -->
<div id="shop" class="page active">

<h2>Products</h2>

<div class="product">
  Tomatoes - KES 100
  <button onclick="addToCart('Tomatoes',100)">Add</button>
</div>

<div class="product">
  Bananas - KES 80
  <button onclick="addToCart('Bananas',80)">Add</button>
</div>

<div class="product">
  Cabbage - KES 60
  <button onclick="addToCart('Cabbage',60)">Add</button>
</div>

<h3>Cart</h3>
<ul id="cartList"></ul>

<button onclick="placeOrder()">Place Order</button>

</div>

<!-- ADMIN PAGE -->
<div id="admin" class="page">

<h2>Dashboard</h2>

<div class="cards">
  <div class="card">Total Sales<br><b id="sales"></b></div>
  <div class="card">Orders<br><b id="ordersCount"></b></div>
</div>

<h3>Orders</h3>
<table id="ordersTable"></table>

<canvas id="chart"></canvas>

</div>

<script>

/* PAGE SWITCH */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page === 'admin') loadAdmin();
}

/* CART */
let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let list = document.getElementById('cartList');
  list.innerHTML = "";
  cart.forEach(i=>{
    list.innerHTML += `<li>${i.name} - KES ${i.price}</li>`;
  });
}

/* PLACE ORDER */
function placeOrder(){
  if(cart.length === 0) return alert("Cart empty");

  let total = cart.reduce((s,i)=>s+i.price,0);

  let order = {
    items: cart,
    total: total,
    date: new Date().toISOString(),
    status: "Pending"
  };

  let orders = JSON.parse(localStorage.getItem('orders') || '[]');
  orders.push(order);
  localStorage.setItem('orders', JSON.stringify(orders));

  cart = [];
  renderCart();

  alert("Order placed!");
}

/* ADMIN LOAD */
function loadAdmin(){
  let orders = JSON.parse(localStorage.getItem('orders') || '[]');

  // totals
  let totalSales = orders.reduce((s,o)=>s+o.total,0);
  document.getElementById("sales").innerText = "KES " + totalSales;
  document.getElementById("ordersCount").innerText = orders.length;

  // table
  let html = "<tr><th>Total</th><th>Status</th></tr>";
  orders.forEach(o=>{
    html += `<tr><td>KES ${o.total}</td><td>${o.status}</td></tr>`;
  });
  document.getElementById("ordersTable").innerHTML = html;

  // chart
  createChart(orders);
}

/* CHART */
function createChart(orders){
  let ctx = document.getElementById("chart");

  let totals = orders.map(o=>o.total);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: totals.map((_,i)=>"Order "+(i+1)),
      datasets: [{
        label: "Sales",
        data: totals
      }]
    }
  });
}

</script>

</body>
</html>
