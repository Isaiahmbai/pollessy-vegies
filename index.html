<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollessy Vegies & Fruits</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f5; }
header { background:#2e7d32; color:white; padding:15px; text-align:center; }
nav { display:flex; justify-content:space-between; padding:10px; background:#1b5e20; color:white; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.card { background:white; padding:10px; border-radius:10px; }
img { width:100%; height:150px; object-fit:cover; border-radius:8px; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
button { padding:8px; background:#2e7d32; color:white; border:none; cursor:pointer; }
</style>
</head>
<body>

<header>
<h1>Pollessy Vegies & Fruits</h1>
<p>Fresh from farm to your table</p>
</header>

<nav>
<div>Cart: <span id="cartCount">0</span></div>
<div id="userStatus"></div>
<button onclick="toggleAdmin()">Admin</button>
</nav>

<div class="container">

<!-- LOGIN -->
<div id="auth">
<h2>Login / Register</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">
<h2>Add Product</h2>
<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
<input id="image" placeholder="Image URL">
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add</button>
</div>

<h2>Products</h2>
<div id="products" class="grid"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUser = localStorage.getItem('currentUser');

function save(){
localStorage.setItem('products', JSON.stringify(products));
localStorage.setItem('cart', JSON.stringify(cart));
localStorage.setItem('users', JSON.stringify(users));
localStorage.setItem('currentUser', currentUser);
}

function updateUserUI(){
let status=document.getElementById('userStatus');
if(currentUser){
status.innerHTML='Logged in: '+currentUser+' <button onclick="logout()">Logout</button>';
document.getElementById('auth').style.display='none';
}else{
status.innerHTML='Not logged in';
document.getElementById('auth').style.display='block';
}
}

function register(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
if(!u||!p) return alert('fill fields');
users.push({u,p});
alert('registered');
save();
}

function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
let user=users.find(x=>x.u===u && x.p===p);
if(user){ currentUser=u; save(); updateUserUI(); }
else alert('invalid');
}

function logout(){ currentUser=null; save(); updateUserUI(); }

function toggleAdmin(){
let p=document.getElementById('adminPanel');
p.style.display=p.style.display==='none'?'block':'none';
}

function addProduct(){
let name=document.getElementById('name').value;
let price=document.getElementById('price').value;
let image=document.getElementById('image').value;
let desc=document.getElementById('desc').value;
if(!name||!price)return alert('fill required');
products.push({name,price,image,desc});
save();
display();
}

function addToCart(i){
cart.push(products[i]);
save();
updateCart();
}

function updateCart(){ document.getElementById('cartCount').innerText=cart.length; }

function placeOrder(){
if(!currentUser) return alert('Login first');
let location=prompt('Enter delivery location');
let order={user:currentUser, items:cart, location, date:new Date()};
let orders=JSON.parse(localStorage.getItem('orders'))||[];
orders.push(order);
localStorage.setItem('orders', JSON.stringify(orders));
alert('Order sent');
cart=[]; save(); updateCart();
}

function display(){
let c=document.getElementById('products');
c.innerHTML='';
products.forEach((p,i)=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`
<img src="${p.image||'https://via.placeholder.com/200'}">
<h3>${p.name}</h3>
<p>${p.desc||''}</p>
<b>KES ${p.price}</b><br>
<button onclick="addToCart(${i})">Add to Cart</button>
`;
c.appendChild(d);
});
}

updateCart();
display();
updateUserUI();

let btn=document.createElement('button');
btn.innerText='Place Order';
btn.style.position='fixed';
btn.style.bottom='20px';
btn.style.right='20px';
btn.onclick=placeOrder;
document.body.appendChild(btn);

</script>

</body>
</html>
