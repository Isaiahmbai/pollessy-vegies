<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pollessy Vegies & Fruits</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f5f6f8; }

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:white;
}
.logo img { height:50px; }

.btn {
  background:#16a34a;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* HERO */
.hero {
  display:flex;
  padding:60px;
  background:#e8f0eb;
}
.hero-text { flex:1; }
.hero-text h1 { font-size:48px; }
.hero-text p { color:#555; }

.hero img { width:400px; }

/* SHOP */
.section { padding:40px; display:none; }
.active { display:block; }

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.product {
  background:white;
  padding:10px;
  border-radius:10px;
}
.product img {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* ADMIN */
.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

table { width:100%; margin-top:20px; }
td,th { padding:10px; border-bottom:1px solid #ddd; }
</style>
</head>

</div>

<!-- SHOP -->
<div id="shop" class="section">
<h2>Shop Products</h2>

<div class="products" id="productList"></div>

<h3>Cart</h3>
<ul id="cart"></ul>
<button onclick="placeOrder()">Place Order</button>

<button onclick="show('admin')">Go to Admin</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h2>Admin Dashboard</h2>

<div class="cards">
  <div class="card">Products<br><b id="pCount"></b></div>
  <div class="card">Orders<br><b id="oCount"></b></div>
  <div class="card">Sales<br><b id="sales"></b></div>
  <div class="card">Low Stock<br><b id="low"></b></div>
</div>

<h3>Orders</h3>
<table id="ordersTable"></table>

<canvas id="chart"></canvas>
</div>

<script>

/* NAV */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('home').style.display='none';
  document.getElementById(id).classList.add('active');
}

/* STORAGE */
const get = k => JSON.parse(localStorage.getItem(k)||'[]');
const set = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* LOAD PRODUCTS */
function loadProducts(){
  let list = document.getElementById("productList");
  let products = get('products');

  list.innerHTML="";
  products.forEach(p=>{
    list.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        KES ${p.price}
        <button onclick="addToCart('${p.name}',${p.price})">Add</button>
      </div>
    `;
  });
}

/* CART */
let cart=[];
function addToCart(n,p){
  cart.push({n,p});
  renderCart();
}

function renderCart(){
  cartList = document.getElementById("cart");
  cartList.innerHTML="";
  cart.forEach(i=>{
    cartList.innerHTML += `<li>${i.n} - ${i.p}</li>`;
  });
}

/* ORDER */
function placeOrder(){
  let total = cart.reduce((s,i)=>s+i.p,0);

  let orders = get('orders');
  orders.push({items:cart,total,status:"Pending"});
  set('orders',orders);

  cart=[];
  renderCart();
  alert("Order placed");
}

/* ADMIN */
function loadAdmin(){
  let p = get('products');
  let o = get('orders');

  pCount.innerText = p.length;
  oCount.innerText = o.length;
  sales.innerText = "KES "+o.reduce((s,x)=>s+x.total,0);
  low.innerText = p.filter(x=>x.qty<5).length;

  ordersTable.innerHTML =
    "<tr><th>Total</th><th>Status</th></tr>" +
    o.map(x=>`<tr><td>${x.total}</td><td>${x.status}</td></tr>`).join("");

  new Chart(chart,{
    type:'bar',
    data:{
      labels:o.map((_,i)=>"Order "+(i+1)),
      datasets:[{data:o.map(x=>x.total)}]
    }
  });
}

loadProducts();
loadAdmin();

</script>

</body>
</html>
